<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Space cat</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background: #222;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .loader {
            width: 50px;
            height: 50px;
            border: 5px solid #f3f3f3;
            border-top: 5px solid #3498db;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        #stateCanvas {
            border: 2px solid #444;
            background: #333;
            display: block;
            /*block-size: 50%;*/
        }
    </style>

</head>
<body>
<canvas id="stateCanvas" width="800" height="600"></canvas>
<script type="module" src="./src/index.js"></script>
</body>
</html>
